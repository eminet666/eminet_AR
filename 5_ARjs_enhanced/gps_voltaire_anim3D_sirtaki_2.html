<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>AR.js - GPS Lissé + Gyro Stabilisé</title>

<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/3.3.3/three.js/build/ar-threex-location-only.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/3.3.3/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@6.1.1/dist/aframe-extras.loaders.min.js"></script>    <script src="https://ensaama-officiel-numerique.github.io/components/AR_utils/AR_components.js"></script>
<script src="https://ensaama-officiel-numerique.github.io/components/AR_utils/AR_components.js"></script>
    
    <script>
        AFRAME.registerComponent('random-animator', {
            schema: {
                clips: { type: 'string', default: 'pas_01,pas_02,pas_03,pas_04,pas_05' },
                minDelay: { type: 'number', default: 0 }   // délai mini entre deux animations (ms)
            },

            init() {
                this.clipList = this.data.clips.split(',').map(s => s.trim());
                this.lastClip = null;
                this.mixer = null;

                // Attend que le modèle GLB soit chargé
                this.el.addEventListener('model-loaded', () => {
                    this.mixer = this.el.components['animation-mixer'];
                    this.playRandom();
                });
            },

            // Choisit une animation différente de la précédente
            pickClip() {
                const others = this.clipList.filter(c => c !== this.lastClip);
                return others[Math.floor(Math.random() * others.length)];
            },

            playRandom() {
                const clip = this.pickClip();
                this.lastClip = clip;

                // Injecte le clip dans animation-mixer
                this.el.setAttribute('animation-mixer', {
                    clip: clip,
                    loop: 'once',
                    clampWhenFinished: true
                });

                // Récupère la durée du clip pour enchaîner
                this.el.addEventListener('animation-finished', () => {
                    setTimeout(() => this.playRandom(), this.data.minDelay);
                }, { once: true });

                console.log(`random-animator → ${clip}`);
            }
        });

        // ─── Chef d'orchestre : choisit le clip et prévient les autres ───
            AFRAME.registerComponent('sync-animator-master', {
                schema: {
                clips: {type: 'string', default: 'pas_01,pas_02,pas_03,pas_04,pas_05' },
            targets: {type: 'string', default: '' },  // ids séparés par virgule ex: "danseur1,danseur2,danseur3"
            minDelay: {type: 'number', default: 0 }
            },

            init() {
                this.clipList = this.data.clips.split(',').map(s => s.trim());
                this.targetIds = this.data.targets.split(',').map(s => s.trim());
            this.lastClip = null;

                // Attend que CE modèle soit chargé avant de démarrer
                this.el.addEventListener('model-loaded', () => this.playSync());
            },

            pickClip() {
                const others = this.clipList.filter(c => c !== this.lastClip);
            return others[Math.floor(Math.random() * others.length)];
            },

            playSync() {
                const clip = this.pickClip();
            this.lastClip = clip;

                // Applique le clip sur tous les targets (y compris lui-même)
                this.targetIds.forEach(id => {
                    const el = document.getElementById(id);
            if (!el) return;
            el.setAttribute('animation-mixer', {
                clip: clip,
            loop: 'once',
            clampWhenFinished: true
                    });
                });

            console.log(`sync-animator → ${clip}`);

                // Enchaîne sur l'événement du master uniquement
                this.el.addEventListener('animation-finished', () => {
                    setTimeout(() => this.playSync(), this.data.minDelay);
                }, { once: true });
            }
        });
    </script>    
    
    <link rel="stylesheet" href="https://ensaama-officiel-numerique.github.io/components/AR_utils/map.css">
</head>

<body>
    <a-scene vr-mode-ui='enabled: false'
             arjs='sourceType: webcam; videoTexture: true; debugUIEnabled: false'
             renderer='antialias: true; alpha: true;'>

        <a-assets>
            <!-- écrire ligne pour asset pour un model 3D en glb -->
            <a-asset-item id="zorba" src="./assets/antoine_hugo.glb"></a-asset-item>
            <a-mixin id="commun" gltf-model="#zorba" 
                rotation="0 0 0" scale="2 2 2">
            </a-mixin>
        </a-assets>

        <!--
            La caméra reçoit les deux composants :
            - smooth-gps   : lisse la position GPS
            - gyro-orientation : stabilise le cap magnétique
            - gpsMinDistance: 0 car smooth-gps gère les mises à jour
        -->
        <a-camera near="0.01" far="10000" 
            smooth-gps="bufferSize: 5; interval: 2000"
            gyro-orientation="bufferSize: 8; enabled: true" 
            gps-new-camera='gpsMinDistance: 0'>
        </a-camera>

        <!-- Terrasse Voltaire -->
        <a-entity gps-new-entity-place="latitude: 48.860781; longitude: 2.373874">
            <a-entity id="danseur1" mixin="commun" position="0 0 0"
                sync-animator-master="clips: pas_01,pas_02,pas_03,pas_04,pas_05;
                                    targets: danseur1,danseur2,danseur3;
                                    minDelay: 0">
            </a-entity>
            <a-entity id="danseur2" mixin="commun" position="-4 0 0">
            </a-entity>
            <a-entity id="danseur3" mixin="commun" position="4 0 0">
            </a-entity>
        </a-entity>

    </a-scene>
</body>

</html>
